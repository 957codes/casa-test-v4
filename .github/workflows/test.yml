name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Preflight and tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Zero runtime dependencies: no npm install step, by design.
      - name: Preflight validator
        run: node scripts/check-plugin.mjs

      - name: Tests
        run: npm test
